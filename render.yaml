services:
  - type: web
    name: rag-api
    env: docker
    plan: starter
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHONUNBUFFERED
        value: "1"
    autoDeploy: true
    disk:
      name: chroma_db
      mountPath: /app/chroma_db
      sizeGB: 5
